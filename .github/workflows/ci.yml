name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,pfx]"
      - name: Lint
        run: ruff check .
      - name: Unit and contract tests
        run: pytest tests/ -m "not live" --cov=pjm_api --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          fail_ci_if_error: false

  live:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev,pfx]"
      - name: Live tests
        env:
          PJM_LIVE_TEST: "1"
          PJM_USERNAME: ${{ secrets.PJM_USERNAME }}
          PJM_PASSWORD: ${{ secrets.PJM_PASSWORD }}
          PJM_CERT: ${{ secrets.PJM_CERT }}
          PJM_BACKEND: native
          PJM_ENV: TRAIN
        run: pytest tests/live -m live
